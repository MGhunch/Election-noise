<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Election Noise — Calibrate</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
:root {
  --ink: #151515;
  --muted: #6b6b6b;
  --line: #dedede;
  --soft: #f5f5f3;
  --white: #ffffff;
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
html { color-scheme: light; }
body {
  margin: 0;
  background: var(--white);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, input, textarea, select { font: inherit; color: inherit; }

/* ---------- Password gate ---------- */
#gate {
  position: fixed; inset: 0; z-index: 999;
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
}
.gate-box { width: min(320px, calc(100% - 48px)); text-align: center; }
.gate-box p.eyebrow { margin: 0 0 8px; }
.gate-box h1 { font-size: 1.3rem; margin: 0 0 18px; }
.gate-box input {
  width: 100%; padding: 11px 13px; border: 1px solid var(--line);
  border-radius: 8px; font-size: 0.95rem; margin-bottom: 10px;
}
.gate-box button {
  width: 100%; padding: 11px; border: 0; border-radius: 8px;
  background: var(--ink); color: var(--white); font-weight: 700; cursor: pointer;
}
.gate-error { color: #c22; font-size: 0.82rem; min-height: 18px; margin-top: 4px; }

/* ---------- Chrome ---------- */
.site-header, main, footer, .cal-footer {
  width: min(1180px, calc(100% - 32px));
  margin-inline: auto;
}
.site-header {
  display: flex; justify-content: space-between; gap: 24px; align-items: end;
  padding: 42px 0 26px; border-bottom: 1px solid var(--line);
}
.eyebrow {
  margin: 0 0 8px; color: var(--muted); font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.11em; text-transform: uppercase;
}
h1, h2, p { margin-top: 0; }
h1 {
  margin-bottom: 14px; margin-left: -0.045em;
  font-size: clamp(2.6rem, 7vw, 5.8rem); line-height: 0.9; letter-spacing: -0.065em;
}
.dek { margin-bottom: 0; color: var(--muted); font-size: clamp(1rem, 2vw, 1.25rem); }
.update-block { text-align: right; font-size: 0.82rem; color: var(--muted); }
.update-block strong { display: block; color: var(--ink); font-size: 0.95rem; }
.save-indicator { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }
.save-indicator.is-saved { color: #1a7d3a; }

.party-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--party-colour, var(--ink)); }

/* ---------- Table ---------- */
.table-scroll { overflow-x: auto; margin-top: 22px; }
.row-grid {
  display: grid;
  grid-template-columns: 20px minmax(220px, 2.3fr) minmax(150px, 1.3fr) 96px minmax(140px, 1.3fr) 40px;
  gap: 14px;
  align-items: center;
  min-width: 780px;
}
.table-head {
  padding: 0 4px 8px;
  border-bottom: 1px solid var(--line);
  font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
}

.accordion { margin-top: 4px; }
.party-group { border-bottom: 1px solid var(--line); }
.party-header {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 14px 4px; background: none; border: 0; cursor: pointer; text-align: left;
}
.party-header:hover { background: var(--soft); }
.party-header-left { display: flex; align-items: center; gap: 10px; }
.party-header .party-dot { width: 12px; height: 12px; }
.party-header strong { font-size: 0.98rem; }
.party-header .muted { color: var(--muted); font-size: 0.8rem; }
.party-chevron { font-size: 1.5rem; line-height: 1; transition: transform 160ms ease; color: var(--muted); }
.party-group.is-open .party-chevron { transform: rotate(90deg); }
.party-body { display: none; padding: 4px 4px 14px; }
.party-group.is-open .party-body { display: block; }

.policy-row {
  padding: 10px 4px;
  border-bottom: 1px solid var(--soft);
  cursor: pointer;
  background: none;
  border-left: 0; border-right: 0; border-top: 0;
  text-align: left;
  width: 100%;
}
.policy-row:hover { background: var(--soft); }
.policy-row.is-changed { background: #fffbea; }
.policy-row:last-child { border-bottom: 0; }

.row-dot {
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--party-colour); border: 2px solid rgba(0,0,0,0.12);
}
.row-dot.is-unverified { background: var(--white); border: 2.5px solid var(--party-colour); }

.row-title { font-size: 0.86rem; font-weight: 700; line-height: 1.25; }
.row-meta { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
.row-value { font-size: 0.8rem; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-value.is-blank { color: var(--muted); font-style: italic; }
.row-conf { font-size: 0.85rem; text-align: center; }
.changed-dot { color: #8a6d00; font-size: 0.7rem; margin-left: 4px; }

/* ---------- Modal ---------- */
#modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(20,20,20,0.4);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 32px 16px;
  overflow-y: auto;
}
.modal-panel {
  background: var(--white);
  border-radius: 14px;
  width: min(760px, 100%);
  padding: 22px 24px 0;
}
.modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 3px; }
.modal-head-left { display: flex; align-items: flex-start; gap: 9px; }
.modal-head-left .row-dot { margin-top: 5px; }
.modal-title { font-size: 1.1rem; font-weight: 800; line-height: 1.25; }
.modal-close {
  border: 1px solid var(--line); background: var(--white); border-radius: 8px;
  width: 30px; height: 30px; cursor: pointer; font-size: 1rem; line-height: 1; color: var(--muted);
  flex: 0 0 auto;
}
.modal-close:hover { background: var(--soft); }
.modal-meta { font-size: 0.76rem; color: var(--muted); margin: 0 0 14px; }
.modal-body { padding-bottom: 4px; }
.modal-footer {
  position: sticky; bottom: 0;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 0; margin-top: 6px;
  background: var(--white); border-top: 1px solid var(--line);
}
.modal-nav { display: flex; gap: 8px; }
.modal-nav button {
  border: 1px solid var(--line); background: var(--white); border-radius: 8px;
  padding: 6px 12px; font-size: 0.78rem; font-weight: 700; cursor: pointer;
}
.modal-nav button:hover:not(:disabled) { background: var(--soft); }
.modal-nav button:disabled { opacity: 0.35; cursor: default; }
.modal-save {
  border: 0; border-radius: 8px; padding: 9px 18px; font-size: 0.85rem;
  background: var(--ink); color: var(--white); font-weight: 700; cursor: pointer;
}

.desc-block { margin: 0 0 4px; }
.desc-block label {
  display: block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.04em; color: var(--muted); margin-bottom: 3px;
}
.desc-block textarea {
  width: 100%; padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px;
  font-size: 0.86rem; background: var(--white); min-height: 40px; resize: vertical;
}

.axis-row {
  display: grid;
  grid-template-columns: 90px minmax(150px, 220px) 1fr;
  gap: 8px 16px;
  padding: 9px 0;
  border-top: 1px solid var(--soft);
  align-items: start;
}
.axis-label {
  font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink); padding-top: 6px;
}
.axis-data { display: flex; flex-direction: column; gap: 6px; }
.axis-data .sub-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: -3px; }
.axis-data select {
  width: 100%; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px;
  font-size: 0.82rem; background: var(--white);
}
.axis-why label {
  display: block; font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.04em; color: var(--muted); margin-bottom: 3px;
}
.axis-why textarea {
  width: 100%; padding: 6px 9px; border: 1px solid var(--line); border-radius: 6px;
  font-size: 0.82rem; background: var(--white); min-height: 34px; resize: vertical;
}
.source-name { font-size: 0.86rem; font-weight: 700; }
.source-btn {
  display: inline-block; font-size: 0.8rem; font-weight: 700; color: var(--ink);
  border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px;
  text-decoration: none; white-space: nowrap;
}
.source-btn:hover { background: var(--soft); }
.source-none { color: var(--muted); font-size: 0.82rem; }

@media (max-width: 720px) {
  .axis-row { grid-template-columns: 1fr; }
  .modal-panel { padding: 20px 18px 16px; }
}

/* ---------- Sticky footer ---------- */
.cal-footer {
  position: sticky; bottom: 0;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 14px 0; background: var(--white); border-top: 1px solid var(--line); margin-top: 10px;
}
.btn { border: 0; border-radius: 8px; padding: 9px 15px; font-size: 0.86rem; background: var(--ink); color: var(--white); font-weight: 700; cursor: pointer; }
footer { display: flex; justify-content: space-between; padding: 20px 0 36px; color: var(--muted); font-size: 0.78rem; }
</style>
</head>

    <p class="gate-error" id="gate-error"></p>
  </div>
</div>

<div id="app" hidden>

    <button class="btn" id="export-btn" type="button">Export Data File</button>
  </div>

  <footer>
    <span>Calibration tool. Changes update the data file. No live changes to the data.</span>
    <span>Built by Hunch</span>
  </footer>
</div>

<div id="modal-overlay" hidden>
  <div class="modal-panel" id="modal-panel"></div>

let policies = [];       // working (editable) array
let baseline = [];       // first-pass snapshot, for "changed" + reset
let openParties = new Set();
let currentModalId = null;

const gate = document.getElementById("gate");
const app = document.getElementById("app");

document.getElementById("gate-submit").addEventListener("click", tryUnlock);
document.getElementById("gate-input").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

function tryUnlock() {
  const val = document.getElementById("gate-input").value;
  if (val === PASSWORD) {
    sessionStorage.setItem("enCalibrateAuth", "1");
    gate.hidden = true;
    app.hidden = false;
    boot();
  } else {
    document.getElementById("gate-error").textContent = "Wrong password.";
  }
}

if (sessionStorage.getItem("enCalibrateAuth") === "1") {
  gate.hidden = true;
  app.hidden = false;
  boot();
}

async function boot() {
  let payload;
  try {
    const res = await fetch("../data/policies.json", { cache: "no-store" });
    if (!res.ok) throw new Error("fetch failed");
    payload = await res.json();
  } catch (err) {
    payload = POLICIES_FALLBACK;
  }

  const rawPolicies = Array.isArray(payload) ? payload : payload.policies;

  policies = rawPolicies.map(p => {
    const politics = POLITICS_FIRST_PASS[p.id] || { econ: "Centre", soc: "Centre", confidence: "low", note: "No first-pass score reconstructed — needs a fresh read." };
    return {
      id: p.id,
      party: p.party,
      title: p.title,
      conversation: p.conversation,
      secondary: p.secondary || "",
      size: p.size,
      verified: p.verified,
      source: p.source || "",
      description: p.description || DESCRIPTIONS[p.id] || "",
      immediacy: p.immediacy != null ? p.immediacy : 3,
      mechanism: p.mechanism != null ? p.mechanism : 3,
      shapeWhy: p.shapeWhy || "",
      sizeWhy: p.sizeWhy || "",
      leftRight: p.leftRight || politics.econ,
      progConservative: p.progConservative || politics.soc,
      confidence: p.confidence || politics.confidence,
      politicsWhy: p.notes || politics.note
    };
  });

  baseline = JSON.parse(JSON.stringify(policies));

  restoreDraft();

  document.getElementById("policy-count-label").textContent = `${policies.length} policies`;

  renderAccordion();
  updateEditCount();

  document.getElementById("export-btn").addEventListener("click", doExport);

  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target.id === "modal-overlay") closeModal();
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });
}

/* ---------------- Local draft persistence ---------------- */
function restoreDraft() {
  let raw;
  try {
    raw = localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    return;
  }
  if (!raw) return;
  let draft;
  try {
    draft = JSON.parse(raw);
  } catch (e) {
    return;
  }
  if (!draft || !draft.policies) return;

  policies.forEach(p => {
    const saved = draft.policies[p.id];
    if (!saved) return;
    EDITABLE_FIELDS.forEach(field => {
      if (saved[field] !== undefined) p[field] = saved[field];
    });
  });

  if (draft.savedAt) {
    const indicator = document.getElementById("save-indicator");
    indicator.textContent = `Restored local save from ${new Date(draft.savedAt).toLocaleString()}`;
    indicator.classList.add("is-saved");
  }
}

function saveDraft() {
  const draftPolicies = {};
  policies.forEach(p => {
    const entry = {};
    EDITABLE_FIELDS.forEach(field => { entry[field] = p[field]; });
    draftPolicies[p.id] = entry;
  });
  const payload = { savedAt: new Date().toISOString(), policies: draftPolicies };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    const indicator = document.getElementById("save-indicator");
    indicator.textContent = `Saved locally ${new Date().toLocaleTimeString()}`;
    indicator.classList.add("is-saved");
  } catch (e) {
    const indicator = document.getElementById("save-indicator");
    indicator.textContent = "Local save failed (storage full or blocked)";
    indicator.classList.remove("is-saved");
  }
}

function visiblePolicies() {
  return policies;
}

/* ---------------- Compact table ---------------- */
function renderAccordion() {
  const container = document.getElementById("accordion");
  const vis = visiblePolicies();
  const parties = PARTY_ORDER.filter(party => vis.some(p => p.party === party));

  container.innerHTML = parties.map(party => {
    const partyPolicies = vis.filter(p => p.party === party).sort((a, b) => a.id.localeCompare(b.id));
    const changedCount = partyPolicies.filter(isChanged).length;
    const isOpen = openParties.has(party);
    const colour = PARTY_COLOURS[party];

    const rows = partyPolicies.map(rowHtml).join("");

    return `<div class="party-group ${isOpen ? "is-open" : ""}" data-party-group="${party}">
      <button class="party-header" type="button" data-toggle-party="${party}">
        <span class="party-header-left">
          <span class="party-dot" style="--party-colour:${colour}"></span>
          <strong>${party}</strong>
          <span class="muted">${partyPolicies.length} ${partyPolicies.length === 1 ? "policy" : "policies"}${changedCount ? ` · ${changedCount} changed` : ""}</span>
        </span>
        <span class="party-chevron">›</span>
      </button>
      <div class="party-body">${rows}</div>
    </div>`;
  }).join("");

  container.querySelectorAll("[data-toggle-party]").forEach(btn => {
    btn.addEventListener("click", () => {
      const party = btn.dataset.toggleParty;
      if (openParties.has(party)) openParties.delete(party); else openParties.add(party);
      renderAccordion();
    });
  });

  container.querySelectorAll("[data-open-policy]").forEach(btn => {
    btn.addEventListener("click", () => openModal(btn.dataset.openPolicy));
  });
}

function rowHtml(p) {
  const changed = isChanged(p);
  const colour = PARTY_COLOURS[p.party] || "#777";
  const dotCls = "row-dot" + (p.verified === false ? " is-unverified" : "");

  const shapeVal = `${IMMEDIACY_LABELS[p.immediacy]} · ${MECHANISM_LABELS[p.mechanism]}`;
  const politicsVal = `${p.leftRight} · ${p.progConservative}`;
  const descBlank = !p.description ? "is-blank" : "";

  return `<button class="policy-row ${changed ? "is-changed" : ""}" type="button" data-open-policy="${p.id}">
    <div class="row-grid">
      <span class="${dotCls}" style="--party-colour:${colour}"></span>
      <span>
        <span class="row-title">${escapeHtml(p.title)}${changed ? '<span class="changed-dot">●</span>' : ""}</span>
        <div class="row-meta">${escapeHtml(p.conversation)} · ${p.verified === false ? "party site only" : "reported"}</div>
      </span>
      <span class="row-value" title="${escapeHtml(shapeVal)}">${escapeHtml(shapeVal)}</span>
      <span class="row-value">${p.size}</span>
      <span class="row-value" title="${escapeHtml(politicsVal)}">${escapeHtml(politicsVal)}</span>
      <span class="row-conf">${CONFIDENCE_MARK[p.confidence] || "○"}</span>
    </div>
  </button>`;
}

/* ---------------- Modal ---------------- */
function openModal(id) {
  currentModalId = id;
  renderModal();
  document.getElementById("modal-overlay").hidden = false;
}

function closeModal() {
  currentModalId = null;
  document.getElementById("modal-overlay").hidden = true;
}

function modalOrderedList() {
  // Same party, filtered, sorted — matches what's on screen behind the modal.
  const p = policies.find(pp => pp.id === currentModalId);
  if (!p) return [];
  return visiblePolicies().filter(pp => pp.party === p.party).sort((a, b) => a.id.localeCompare(b.id));
}

      <div class="axis-row">
        <div class="axis-label">Shape</div>
        <div class="axis-data">
          <div class="sub-label">Immediacy</div>
          <select data-id="${p.id}" data-field="immediacy">
            ${[1,2,3,4,5].map(n => `<option value="${n}" ${p.immediacy === n ? "selected" : ""}>${n} — ${IMMEDIACY_LABELS[n]}</option>`).join("")}
          </select>
          <div class="sub-label">Mechanism</div>
          <select data-id="${p.id}" data-field="mechanism">
            ${[1,2,3,4,5].map(n => `<option value="${n}" ${p.mechanism === n ? "selected" : ""}>${n} — ${MECHANISM_LABELS[n]}</option>`).join("")}
          </select>
        </div>
        <div class="axis-why">
          <label>Why?</label>
          <textarea data-id="${p.id}" data-field="shapeWhy" rows="2" placeholder="Why this Immediacy/Mechanism score?">${escapeHtml(p.shapeWhy || "")}</textarea>
        </div>
      </div>

      <div class="axis-row">
        <div class="axis-label">Size</div>
        <div class="axis-data">
          <select data-id="${p.id}" data-field="size">
            ${SIZE_ORDER.map(s => `<option value="${s}" ${p.size === s ? "selected" : ""}>${s}</option>`).join("")}
          </select>
        </div>
        <div class="axis-why">
          <label>Why?</label>
          <textarea data-id="${p.id}" data-field="sizeWhy" rows="2" placeholder="Why this size tier?">${escapeHtml(p.sizeWhy || "")}</textarea>
        </div>
      </div>

      <div class="axis-row">
        <div class="axis-label">Politics</div>
        <div class="axis-data">
          <div class="sub-label">Econ L↔R</div>
          <select data-id="${p.id}" data-field="leftRight">
            ${ECON.map(v => `<option value="${v}" ${p.leftRight === v ? "selected" : ""}>${v}</option>`).join("")}
          </select>
          <div class="sub-label">Social P↔C</div>
          <select data-id="${p.id}" data-field="progConservative">
            ${SOC.map(v => `<option value="${v}" ${p.progConservative === v ? "selected" : ""}>${v}</option>`).join("")}
          </select>
        </div>
        <div class="axis-why">
          <label>Why?</label>
          <textarea data-id="${p.id}" data-field="politicsWhy" rows="2" placeholder="Why this Econ/Social score?">${escapeHtml(p.politicsWhy || "")}</textarea>
        </div>
      </div>

      ${sourceRow}
    </div>

    <div class="modal-footer">
      <div class="modal-nav">
        <button type="button" id="modal-prev" ${idx <= 0 ? "disabled" : ""}>← Prev</button>
        <button type="button" id="modal-next" ${idx < 0 || idx >= list.length - 1 ? "disabled" : ""}>Next →</button>
      </div>
      <button class="modal-save" type="button" id="modal-save-btn">Save</button>
    </div>
  `;

  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
  document.getElementById("modal-save-btn").addEventListener("click", () => {
    saveDraft();
    closeModal();
  });
  document.getElementById("modal-prev").addEventListener("click", () => {
    if (idx > 0) openModal(list[idx - 1].id);
  });
  document.getElementById("modal-next").addEventListener("click", () => {
    if (idx < list.length - 1) openModal(list[idx + 1].id);
  });

  document.querySelectorAll("#modal-panel select[data-field]").forEach(el => {
    el.addEventListener("change", () => applyField(el));
  });
  document.querySelectorAll("#modal-panel textarea[data-field]").forEach(el => {
    el.addEventListener("change", () => applyField(el));
    el.addEventListener("blur", () => applyField(el));
  });
}

function applyField(el) {
  const id = el.dataset.id, field = el.dataset.field;
  const policy = policies.find(p => p.id === id);
  if (!policy) return;
  const value = (field === "immediacy" || field === "mechanism") ? Number(el.value) : el.value;
  if (policy[field] === value) return;
  policy[field] = value;
  saveDraft();
  renderAccordion();
  updateEditCount();
  // Keep the row's changed-state fresh underneath without closing the modal.
  if (currentModalId === id) {
    const idx = modalOrderedList().findIndex(pp => pp.id === id);
    const prevBtn = document.getElementById("modal-prev");
    const nextBtn = document.getElementById("modal-next");
    if (prevBtn) prevBtn.disabled = idx <= 0;
    if (nextBtn) nextBtn.disabled = idx < 0 || idx >= modalOrderedList().length - 1;
  }
}

function isChanged(p) {
  const base = baseline.find(b => b.id === p.id);
  if (!base) return false;
  return base.size !== p.size || base.immediacy !== p.immediacy || base.mechanism !== p.mechanism ||
    base.leftRight !== p.leftRight || base.progConservative !== p.progConservative ||
    base.confidence !== p.confidence ||
    (base.description || "") !== (p.description || "") ||
    (base.shapeWhy || "") !== (p.shapeWhy || "") ||
    (base.sizeWhy || "") !== (p.sizeWhy || "") ||
    (base.politicsWhy || "") !== (p.politicsWhy || "");
}

function updateEditCount() {
  const n = policies.filter(isChanged).length;
  document.getElementById("edit-count").textContent = `${n} ${n === 1 ? "policy" : "policies"} changed`;
}

/* ---------------- Export ---------------- */
function doExport() {
  const out = {
    updated: new Date().toISOString().slice(0, 10),
    note: "Solid circles reported by RNZ; outlined circles link to party websites. Includes calibrated Shape/Size/Politics scoring, rationale and descriptions.",
    policies: policies.map(p => ({
      id: p.id,
      party: p.party,
      title: p.title,
      conversation: p.conversation,
      secondary: p.secondary,
      size: p.size,
      verified: p.verified,
      source: p.source,
      description: p.description,
      immediacy: p.immediacy,
      mechanism: p.mechanism,
      shapeWhy: p.shapeWhy,
      sizeWhy: p.sizeWhy,
      leftRight: p.leftRight,
      progConservative: p.progConservative,
      confidence: p.confidence,
      notes: p.politicsWhy
    }))
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "policies.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
